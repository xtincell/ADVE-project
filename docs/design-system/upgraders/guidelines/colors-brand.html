<!-- @dsCard group="Colors" viewport="700x190" name="Brand — Rouge Fusée & Or" subtitle="Signature accent + gold reward" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:24px;display:flex;gap:14px;flex-wrap:wrap}
 .sw{flex:1;min-width:96px}
 .chip{height:84px;border-radius:var(--radius-lg);border:1px solid var(--glass-stroke)}
 .nm{font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--text-primary);margin-top:10px}
 .hx{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:2px}
 .rl{font-family:var(--font-sans);font-size:11px;color:var(--text-secondary);margin-top:1px}
</style></head>
<body><div class="up-root p">
 <div class="sw"><div class="chip" style="background:var(--up-red);box-shadow:var(--glow-red-sm)"></div><div class="nm">Rouge Fusée</div><div class="hx">#E56458</div><div class="rl">accent · CTA</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-red-hover)"></div><div class="nm">Rouge Hover</div><div class="hx">#EF7D71</div><div class="rl">hover</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-red-active)"></div><div class="nm">Rouge Deep</div><div class="hx">#C8473C</div><div class="rl">pressed</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-red-ember)"></div><div class="nm">Ember</div><div class="hx">#FF6B3D</div><div class="rl">flame · warm</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-gold);box-shadow:var(--glow-gold)"></div><div class="nm">Or</div><div class="hx">#FACC15</div><div class="rl">level · reward</div></div>
</div></body></html>
