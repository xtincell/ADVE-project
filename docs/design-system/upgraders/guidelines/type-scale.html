<!-- @dsCard group="Type" viewport="700x300" name="Échelle typographique" subtitle="Fluid scale, hero → caption" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:26px;display:flex;flex-direction:column;gap:10px}
 .r{display:flex;align-items:baseline;gap:16px}
 .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:96px;flex:none}
 .sample{font-family:var(--font-display);font-weight:600;color:var(--text-primary);letter-spacing:-0.02em;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body><div class="up-root p">
 <div class="r"><span class="tok">4xl · 56</span><span class="sample" style="font-size:56px">Propulsez</span></div>
 <div class="r"><span class="tok">3xl · 40</span><span class="sample" style="font-size:40px">votre croissance</span></div>
 <div class="r"><span class="tok">2xl · 30</span><span class="sample" style="font-size:30px">Vue d'ensemble</span></div>
 <div class="r"><span class="tok">xl · 24</span><span class="sample" style="font-size:24px">Tableau de bord</span></div>
 <div class="r"><span class="tok">lg · 19</span><span class="sample" style="font-size:19px;font-family:var(--font-sans)">Nouvelle campagne</span></div>
 <div class="r"><span class="tok">base · 16</span><span class="sample" style="font-size:16px;font-family:var(--font-sans);font-weight:400">Corps de texte standard</span></div>
 <div class="r"><span class="tok">sm · 14</span><span class="sample" style="font-size:14px;font-family:var(--font-sans);font-weight:400;color:var(--text-secondary)">Métadonnées et libellés</span></div>
 <div class="r"><span class="tok">xs · 12</span><span class="sample" style="font-size:12px;font-family:var(--font-sans);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted)">Eyebrow / kicker</span></div>
</div></body></html>
