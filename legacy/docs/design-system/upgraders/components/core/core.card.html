<!-- @dsCard group="Components" viewport="700x1880" name="Core — buttons, inputs, feedback" subtitle="Buttons · badges · inputs · icons · surfaces · texture" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  .wrap { background: var(--surface-page); padding: 28px; }
  .sec { margin-bottom: 26px; }
  .sec:last-child { margin-bottom: 0; }
  .sec > h4 {
    font-family: var(--font-sans); font-size: 11px; font-weight: 700;
    letter-spacing: .16em; text-transform: uppercase; color: var(--text-muted);
    margin: 0 0 12px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .tcell { position: relative; overflow: hidden; border-radius: var(--radius-lg); border: 1px solid var(--border);
    min-height: 104px; padding: 16px; display: flex; align-items: flex-end; background-color: var(--up-ink-2);
    font-family: var(--font-sans); font-size: 12.5px; font-weight: 700; color: var(--text-secondary); }
  .tcell > .t { position: relative; z-index: 1; }
  .tcell .gl { position: absolute; inset: 14px; border-radius: var(--radius-md); background: var(--glass-fill);
    border: 1px solid var(--glass-stroke); backdrop-filter: blur(var(--blur-md)); -webkit-backdrop-filter: blur(var(--blur-md));
    display: grid; place-items: center; color: var(--text-primary); font-weight: 700; z-index: 1; }
  .ico-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; }
  @media (max-width: 560px){ .ico-grid { grid-template-columns: repeat(6, 1fr); } }
  .ico { aspect-ratio: 1; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface-card);
    display: grid; place-items: center; color: var(--text-secondary); font-size: 21px; transition: color var(--dur-base), border-color var(--dur-base), background var(--dur-base); }
  .ico:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-fill); }
  .tdemo { position: relative; overflow: hidden; border-radius: var(--radius-lg); border: 1px solid var(--border);
    background-color: var(--up-ink-2); padding: 14px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tdemo .lv { height: 58px; border-radius: var(--radius-sm); display: grid; place-items: center;
    font-family: var(--font-mono); font-size: 10.5px; color: #fff; border: 1px solid rgba(255,255,255,.14); position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="up-root wrap">
  <div id="root"></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, Badge, Tag, Input, Select, Switch, Progress, Alert, StatCard, Avatar, AvatarGroup, Card } =
  window.UPgradersDesignSystem_6a9ef3;

const I = (d, fill) => (
  <svg viewBox="0 0 24 24" fill={fill ? "currentColor" : "none"} stroke="currentColor"
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const Search = () => I(<><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></>);
const ArrowR = () => I(<><path d="M5 12h14M13 6l6 6-6 6"/></>);
const Cog = () => I(<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 17 2.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z"/></>);
const Users = () => I(<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/></>);
const Coins = () => I(<><circle cx="8" cy="8" r="6"/><path d="M18.1 6.3A6 6 0 1 1 16 17.7"/><path d="M7 6h1v4M16.7 14H18"/></>);
const Megaphone = () => I(<><path d="m3 11 18-5v12L3 14v-3zM11.6 16.8a3 3 0 1 1-5.8-1.6"/></>);
const Mail = () => I(<><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></>);
const Home = () => I(<><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></>);
const Calendar = () => I(<><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></>);
const Chart = () => I(<><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></>);
const Bell = () => I(<><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></>);
const Heart = () => I(<path d="M12 20s-7-4.4-9.3-8.5C1 8.5 2.4 5 5.7 5c2 0 3.3 1.3 4.3 2.6C11 6.3 12.3 5 14.3 5 17.6 5 19 8.5 17.3 11.5 15 15.6 12 20 12 20Z"/>, true);
const Star = () => I(<path d="m12 2 2.9 6.26 6.84.62-5.16 4.54 1.54 6.7L12 16.9 5.88 20.6l1.54-6.7L2.26 8.88l6.84-.62Z"/>, true);
const Rocket = () => I(<><path d="M4.5 16.5c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.9.7-2.2-.2-3a2.2 2.2 0 0 0-2.8 0Z"/><path d="M12 15 9 12a14 14 0 0 1 3-7c1.6-2.3 4-3.8 7-4 .2 3-1.3 5.4-3.6 7A14 14 0 0 1 12 15Z"/><path d="M9 12H4s.5-2.8 2-4c1.5-1.4 5-1 5-1M12 15v5s2.8-.5 4-2c1.4-1.5 1-5 1-5"/></>);
const Target = () => I(<><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></>);
const Image = () => I(<><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></>);
const Camera = () => I(<><path d="M4 7h3l2-2h6l2 2h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.5"/></>);
const Send = () => I(<><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></>);
const Check = () => I(<path d="m5 12 5 5 9-11"/>);
const Gift = () => I(<><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v9h14v-9M12 8v13M12 8S11 3 8 3a2.5 2.5 0 0 0 0 5h4ZM12 8s1-5 4-5a2.5 2.5 0 0 1 0 5h-4Z"/></>);
const Instagram = () => I(<><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></>);
const Trophy = () => I(<><path d="M6 9a6 6 0 0 0 12 0V4H6Z"/><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 20h6M12 15v5"/></>);
const Bolt = () => I(<path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/>, true);
const ICONS = [
  ["Home", <Home/>], ["Search", <Search/>], ["Mail", <Mail/>], ["Calendar", <Calendar/>], ["Chart", <Chart/>],
  ["Bell", <Bell/>], ["Heart", <Heart/>], ["Star", <Star/>], ["Rocket", <Rocket/>], ["Target", <Target/>],
  ["Image", <Image/>], ["Camera", <Camera/>], ["Send", <Send/>], ["Check", <Check/>], ["Gift", <Gift/>],
  ["Instagram", <Instagram/>], ["Trophy", <Trophy/>], ["Bolt", <Bolt/>], ["Settings", <Cog/>],
  ["Users", <Users/>], ["Coins", <Coins/>], ["Megaphone", <Megaphone/>], ["Next", <ArrowR/>], ["Close", <span style={{fontSize:18}}>×</span>],
];

const avatars = [
  { name: "Awa Diop" }, { name: "Mamadou K." }, { name: "Sophie B." },
  { name: "Kofi A." }, { name: "Bola N." }, { name: "Ama T." },
];

function Demo() {
  const [tab, setTab] = React.useState("Marketing");
  const [dark, setDark] = React.useState(true);
  return (
    <div>
      <div className="sec">
        <h4>Buttons</h4>
        <div className="row">
          <Button variant="primary" iconRight={<ArrowR/>}>Découvrir nos services</Button>
          <Button variant="secondary">Voir la vidéo</Button>
          <Button variant="outline">En savoir plus</Button>
          <Button variant="ghost">Annuler</Button>
        </div>
        <div className="row" style={{ marginTop: 12 }}>
          <Button variant="primary" size="sm">Petit</Button>
          <Button variant="primary" size="md">Moyen</Button>
          <Button variant="primary" size="lg" pill>Commencer maintenant</Button>
          <Button variant="secondary" iconOnly aria-label="Réglages" icon={<Cog/>} />
          <Button variant="primary" disabled>Désactivé</Button>
        </div>
      </div>

      <div className="sec">
        <h4>Badges &amp; Tags</h4>
        <div className="row">
          <Badge tone="warning" dot>En cours</Badge>
          <Badge tone="success" dot>Terminé</Badge>
          <Badge tone="info" dot>En attente</Badge>
          <Badge tone="danger" solid>Priorité haute</Badge>
          <Badge tone="level">Level 7</Badge>
          <Badge tone="success">+18%</Badge>
        </div>
        <div className="row" style={{ marginTop: 12 }}>
          {["Marketing","Branding","Social Media","Design"].map(t => (
            <Tag key={t} active={tab===t} icon={t==="Marketing"?<Megaphone/>:null} onClick={()=>setTab(t)}>{t}</Tag>
          ))}
          <Tag onRemove={()=>{}}>Growth</Tag>
        </div>
      </div>

      <div className="sec">
        <h4>Stat tiles</h4>
        <div className="grid3">
          <StatCard label="Total Clients" value="128" delta="+12%" trend="up" variant="accent" icon={<Users/>} />
          <StatCard label="Revenus" value="2.45M" suffix="FCFA" delta="+18%" trend="up" icon={<Coins/>} />
          <StatCard label="Engagement" value="8.2%" delta="-1.4%" trend="down" icon={<Megaphone/>} />
        </div>
      </div>

      <div className="sec">
        <h4>Inputs &amp; controls</h4>
        <div className="grid2">
          <Input label="Recherche" placeholder="Rechercher…" icon={<Search/>} />
          <Select label="Portail" defaultValue="Client">
            <option>Portail Client</option>
            <option>Portail Collaborateur</option>
            <option>Portail Partenaire</option>
          </Select>
          <Input label="Votre email" type="email" placeholder="vous@marque.pro" icon={<Mail/>} />
          <div style={{ display:"flex", flexDirection:"column", gap:12, justifyContent:"center" }}>
            <Switch checked={dark} onChange={e=>setDark(e.target.checked)} label="Thème sombre" />
            <Switch defaultChecked label="Notifications push" />
          </div>
        </div>
      </div>

      <div className="sec">
        <h4>Progress</h4>
        <div className="grid2">
          <Progress value={70} label="Progression générale" showValue />
          <Progress value={45} tone="warning" label="Objectif mensuel" showValue />
          <Progress value={71} tone="level" label="XP 850 / 1200" />
          <Progress value={92} tone="success" label="Campagne Q2" showValue />
        </div>
      </div>

      <div className="sec">
        <h4>Alerts</h4>
        <div className="grid3">
          <Alert tone="success" title="Succès">Projet enregistré avec succès.</Alert>
          <Alert tone="warning" title="Attention">Cette action est irréversible.</Alert>
          <Alert tone="danger" title="Erreur" onClose={()=>{}}>Une erreur est survenue.</Alert>
        </div>
      </div>

      <div className="sec">
        <h4>Icônes — granularité</h4>
        <div className="ico-grid">
          {ICONS.map(([n, el]) => <div className="ico" key={n} title={n}>{el}</div>)}
        </div>
      </div>

      <div className="sec">
        <h4>Avatars</h4>
        <div className="row">
          <Avatar name="Awa Diop" status="online" />
          <Avatar name="Kofi A." size="lg" ring />
          <AvatarGroup max={4} avatars={avatars} />
          <span style={{ color:"var(--text-muted)", fontSize:14, fontWeight:600 }}>+250 entrepreneurs</span>
        </div>
      </div>

      <div className="sec">
        <h4>Surfaces — sombre, blanc &amp; accent</h4>
        <div className="grid3">
          <Card padding="5">Default cell</Card>
          <Card variant="light" padding="5"><b style={{color:"var(--up-ink-1)"}}>Bento blanc</b><br/><span style={{fontSize:13,color:"var(--text-muted)"}}>surface claire</span></Card>
          <Card variant="accent" padding="5">Prêt à passer au niveau&nbsp;?</Card>
        </div>
      </div>

      <div className="sec">
        <h4>Texture &amp; transparence</h4>
        <div className="grid3">
          <div className="tcell up-texture-geo"><span className="t">Kente weave</span></div>
          <div className="tcell up-texture-diamond"><span className="t">Diamond band</span></div>
          <div className="tcell up-texture-geo"><div className="gl">Glass / blur</div></div>
        </div>
        <div className="tdemo up-texture-geo" style={{ marginTop: 14 }}>
          {[6, 12, 22, 36, 56, 80].map((o) => (
            <div className="lv" key={o} style={{ background: "rgba(255,255,255," + o / 100 + ")", color: o > 40 ? "var(--up-ink-1)" : "#fff" }}>{o}%</div>
          ))}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
