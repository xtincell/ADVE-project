version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      next-and-react:
        patterns:
          - next
          - react
          - react-dom
      prisma:
        patterns:
          - prisma
          - "@prisma/*"
      trpc:
        patterns:
          - "@trpc/*"
      eslint:
        patterns:
          - eslint
          - "eslint-*"
          - "@typescript-eslint/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
      - automated
    commit-message:
      prefix: chore(actions)
