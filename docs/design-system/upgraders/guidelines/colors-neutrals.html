<!-- @dsCard group="Colors" viewport="700x190" name="Bone & Gris — clair + texte" subtitle="Light surfaces and warm neutral text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:24px;display:flex;gap:12px;flex-wrap:wrap}
 .sw{flex:1;min-width:84px}
 .chip{height:84px;border-radius:var(--radius-lg);border:1px solid var(--up-line)}
 .nm{font-family:var(--font-sans);font-weight:700;font-size:12px;color:var(--text-primary);margin-top:10px}
 .hx{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:2px}
 .rl{font-family:var(--font-sans);font-size:11px;color:var(--text-secondary);margin-top:1px}
</style></head>
<body><div class="up-root p">
 <div class="sw"><div class="chip" style="background:var(--up-white)"></div><div class="nm">Blanc</div><div class="hx">#FFFFFF</div><div class="rl">light card</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-bone)"></div><div class="nm">Bone</div><div class="hx">#F5F4F1</div><div class="rl">light page</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-bone-2)"></div><div class="nm">Bone 2</div><div class="hx">#ECE9E3</div><div class="rl">sunken</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-slate-500)"></div><div class="nm">Slate 500</div><div class="hx">#6B6B6B</div><div class="rl">muted text</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-slate-700)"></div><div class="nm">Slate 700</div><div class="hx">#3A3A3A</div><div class="rl">secondary</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-slate-900)"></div><div class="nm">Slate 900</div><div class="hx">#141414</div><div class="rl">text/light</div></div>
</div></body></html>
