<!-- @dsCard group="Type" viewport="700x230" name="Display — Clash Display" subtitle="Headlines, hero, level numerals" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:28px}
 .big{font-family:var(--font-display);font-weight:600;font-size:64px;line-height:1.02;letter-spacing:-0.03em;color:var(--text-primary);margin:0}
 .em{color:var(--accent)}
 .meta{font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:16px;display:flex;gap:18px;flex-wrap:wrap}
 .meta b{color:var(--text-secondary);font-weight:700}
</style></head>
<body><div class="up-root p">
 <p class="big">La Passion pour <span class="em">Propulseur</span></p>
 <div class="meta"><span><b>Clash Display</b> Semibold 600 / Bold 700</span><span>tracking −0.03em</span><span>Aa Bb Cc 0123 — €FCFA</span></div>
</div></body></html>
