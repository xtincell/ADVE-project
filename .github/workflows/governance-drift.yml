name: Governance drift (cron)

on:
  schedule:
    - cron: "0 6 * * 0"  # every Sunday 06:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: Audit + drift detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Governance audit
        id: audit
        run: |
          set -o pipefail
          npm run audit:governance | tee audit.txt
          echo "summary=$(grep '^Summary' audit.txt | tail -1)" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Madge cycles
        id: cycles
        run: |
          set -o pipefail
          npx --yes madge --circular --extensions ts,tsx src/ | tee cycles.txt
          echo "n=$(grep -c '^[0-9]\+)' cycles.txt || true)" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open / refresh drift issue
        if: steps.audit.outcome == 'failure' || steps.cycles.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = fs.readFileSync('audit.txt', 'utf8').slice(0, 6000);
            const cycles = fs.readFileSync('cycles.txt', 'utf8').slice(0, 3000);
            const title = 'Governance drift — weekly audit';
            const body = [
              '## Governance drift detected',
              '',
              'Auto-generated by `.github/workflows/governance-drift.yml`.',
              '',
              '### Audit findings',
              '```',
              audit,
              '```',
              '',
              '### Madge cycles',
              '```',
              cycles,
              '```',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'governance-drift',
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['governance-drift'],
              });
            }
