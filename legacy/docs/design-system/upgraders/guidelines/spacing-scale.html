<!-- @dsCard group="Spacing" viewport="700x180" name="Échelle d'espacement" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:26px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
 .c{display:flex;flex-direction:column;align-items:center;gap:8px}
 .bar{background:linear-gradient(180deg,var(--up-red-ember),var(--accent));border-radius:4px;width:28px}
 .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
 .v{font-family:var(--font-sans);font-size:11px;color:var(--text-secondary);font-weight:700}
</style></head>
<body><div class="up-root p">
 <div class="c"><div class="bar" style="height:4px"></div><div class="tok">1</div><div class="v">4</div></div>
 <div class="c"><div class="bar" style="height:8px"></div><div class="tok">2</div><div class="v">8</div></div>
 <div class="c"><div class="bar" style="height:12px"></div><div class="tok">3</div><div class="v">12</div></div>
 <div class="c"><div class="bar" style="height:16px"></div><div class="tok">4</div><div class="v">16</div></div>
 <div class="c"><div class="bar" style="height:24px"></div><div class="tok">6</div><div class="v">24</div></div>
 <div class="c"><div class="bar" style="height:32px"></div><div class="tok">8</div><div class="v">32</div></div>
 <div class="c"><div class="bar" style="height:48px"></div><div class="tok">12</div><div class="v">48</div></div>
 <div class="c"><div class="bar" style="height:64px"></div><div class="tok">16</div><div class="v">64</div></div>
 <div class="c"><div class="bar" style="height:80px"></div><div class="tok">20</div><div class="v">80</div></div>
</div></body></html>
