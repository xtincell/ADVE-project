<!-- @dsCard group="Components" viewport="700x760" name="Brand — logo, levels, stickers, portals" subtitle="Logo lockups · level hex · stickers · portal selector" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  .wrap { background: var(--surface-page); padding: 28px; }
  .sec { margin-bottom: 26px; }
  .sec:last-child { margin-bottom: 0; }
  .sec > h4 {
    font-family: var(--font-sans); font-size: 11px; font-weight: 700;
    letter-spacing: .16em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 14px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .stickers { display: flex; flex-wrap: wrap; gap: 18px; align-items: center; padding: 6px 0; }
  .lgrid { display: grid; grid-template-columns: 1.6fr 0.7fr 0.7fr; gap: 14px; }
  .lpanel { display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: var(--radius-lg); min-height: 96px; }
  .lpanel--light { background: var(--up-bone); }
  .lpanel--dark { background: var(--up-ink-2); border: 1px solid var(--border); }
  .lpanel--accent { background: var(--accent); box-shadow: var(--glow-red-sm); }
  .lcap { font-family: var(--font-sans); font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-top: 8px; text-align: center; }
  .lcell { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="up-root wrap">
  <div id="root"></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Logo, LevelBadge, Sticker, PortalCard, Card } = window.UPgradersDesignSystem_6a9ef3;
const BP = "../../assets/logos";

const I = (d, fill) => (
  <svg viewBox="0 0 24 24" fill={fill?"currentColor":"none"} stroke="currentColor"
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const Rocket = () => I(<><path d="M4.5 16.5c-1.5 1.3-2 5-2 5s3.7-.5 5-2c.7-.9.7-2.2-.2-3a2.2 2.2 0 0 0-2.8 0z"/><path d="M12 15 9 12a14 14 0 0 1 3-7c1.6-2.3 4-3.8 7-4 .2 3-1.3 5.4-3.6 7A14 14 0 0 1 12 15z"/><path d="M9 12H4s.5-2.8 2-4c1.6-1.4 5-1 5-1M12 15v5s2.8-.5 4-2c1.4-1.6 1-5 1-5"/></>);
const UserCircle = () => I(<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.7 18a6 6 0 0 1 10.6 0"/></>);
const Users = () => I(<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/></>);
const Handshake = () => I(<><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.9-3.9a2 2 0 0 0-2.8 0l-.6.6a2 2 0 0 1-2.8 0l-1.5-1.5a2 2 0 0 1 0-2.8l2.1-2.1"/><path d="M3 13.5 7 9l3 3"/></>);
const Star = () => I(<path d="m12 2 2.9 6.26 6.84.62-5.16 4.54 1.54 6.7L12 16.9 5.88 20.6l1.54-6.7L2.26 8.88l6.84-.62z"/>, true);
const Trophy = () => I(<><path d="M6 9a6 6 0 0 0 12 0V4H6z"/><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 20h6M12 15v5"/></>);

function Demo() {
  const [sel, setSel] = React.useState("client");
  return (
    <div>
      <div className="sec">
        <h4>Logo lockups — artwork de marque</h4>
        <div className="lgrid">
          <div className="lcell"><div className="lpanel lpanel--dark"><Logo variant="lockup-horizontal" size={42} basePath={BP} /></div><div className="lcap">Lockup · sur sombre</div></div>
          <div className="lcell"><div className="lpanel lpanel--dark"><Logo variant="mark" size={54} basePath={BP} /></div><div className="lcap">Marque</div></div>
          <div className="lcell"><div className="lpanel lpanel--accent"><Logo variant="mark" size={50} basePath={BP} circle /></div><div className="lcap">Cercle</div></div>
          <div className="lcell" style={{ gridColumn: "span 2" }}><div className="lpanel lpanel--light"><Logo variant="lockup-horizontal-mono" size={36} basePath={BP} /></div><div className="lcap">Lockup mono · sur clair</div></div>
          <div className="lcell"><div className="lpanel lpanel--light"><Logo variant="monogram" size={54} basePath={BP} /></div><div className="lcap">Monogramme</div></div>
        </div>
      </div>

      <div className="sec">
        <h4>Level system</h4>
        <div className="row" style={{ gap: 28 }}>
          <LevelBadge level={7} rank="Expert" />
          <LevelBadge level={12} tone="red" showMeta={false} size={58} icon={<Rocket/>} />
          <LevelBadge level={3} showMeta={false} size={58} icon={<Trophy/>} />
        </div>
      </div>

      <div className="sec">
        <h4>Stickers — culture entrepreneur</h4>
        <div className="stickers">
          <Sticker tone="red" rotate={-5}>Level <span className="up-sticker__em">Up!</span></Sticker>
          <Sticker tone="dark" rotate={3} icon={<Rocket/>}>Boss Mode</Sticker>
          <Sticker tone="gold" rotate={-2}>Grind Today</Sticker>
          <Sticker tone="white" rotate={4}>Make it Happen</Sticker>
          <Sticker tone="outline" rotate={-3}>Stay Humble</Sticker>
        </div>
      </div>

      <div className="sec">
        <h4>Sélecteur de portail</h4>
        <Card variant="light" padding="5" style={{ maxWidth: 420 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <PortalCard icon={<UserCircle/>} title="Portail Client" subtitle="Accédez à vos projets et rapports"
              accent="var(--up-portal-client)" selected={sel==="client"} onClick={()=>setSel("client")} />
            <PortalCard icon={<Users/>} title="Portail Collaborateur" subtitle="Gérez vos tâches et missions"
              accent="var(--up-portal-creator)" selected={sel==="collab"} onClick={()=>setSel("collab")} />
            <PortalCard icon={<Handshake/>} title="Portail Partenaire" subtitle="Suivez vos partenariats"
              accent="var(--up-portal-agency)" selected={sel==="partner"} onClick={()=>setSel("partner")} />
          </div>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
