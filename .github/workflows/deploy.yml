name: Deploy Coolify

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branche à déployer"
        default: "claude/project-revamp-agent-safe-doc3ip"
      coolify_url:
        description: "URL Coolify (fallback si secret COOLIFY_URL absent)"
        required: false
      coolify_token:
        description: "Token API Coolify (fallback si secret absent — à faire tourner après usage)"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
      - name: Provision + deploy sur Coolify
        env:
          SECRET_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          SECRET_URL: ${{ secrets.COOLIFY_URL }}
          GIT_BRANCH: ${{ inputs.branch }}
        run: |
          COOLIFY_TOKEN="$SECRET_TOKEN"
          if [ -z "$COOLIFY_TOKEN" ]; then
            COOLIFY_TOKEN=$(jq -r '.inputs.coolify_token // empty' "$GITHUB_EVENT_PATH")
          fi
          echo "::add-mask::$COOLIFY_TOKEN"
          COOLIFY_URL="$SECRET_URL"
          if [ -z "$COOLIFY_URL" ]; then
            COOLIFY_URL=$(jq -r '.inputs.coolify_url // empty' "$GITHUB_EVENT_PATH")
          fi
          export COOLIFY_TOKEN COOLIFY_URL
          bash scripts/deploy-coolify.sh
