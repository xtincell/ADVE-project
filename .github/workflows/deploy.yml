name: Deploy Coolify

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branche à déployer"
        default: "claude/project-revamp-agent-safe-doc3ip"
      coolify_url:
        description: "URL Coolify (fallback si secret COOLIFY_URL absent)"
        required: false
      coolify_token:
        description: "Token API Coolify (fallback si secret absent — préférer le secret ; token à faire tourner après usage)"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
      - name: Provision + deploy sur Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL || inputs.coolify_url }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN || inputs.coolify_token }}
          GIT_BRANCH: ${{ inputs.branch }}
        run: |
          echo "::add-mask::$COOLIFY_TOKEN"
          bash scripts/deploy-coolify.sh
