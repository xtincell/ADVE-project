<!-- @dsCard group="Components" viewport="860x360" name="Figure éditoriale" subtitle="Photo encadrée — scan frame, coins techniques, tag & légende" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
 .up-figure{aspect-ratio:16/10}
 .fill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
   background:var(--up-ink-2);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.045) 0 10px,transparent 10px 20px)}
 .fill span{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--text-muted)}
</style></head>
<body><div class="up-root p">
 <figure class="up-figure">
  <span class="fill"><span>photo · 16:10</span></span>
  <span class="up-figure__scan"></span>
  <span class="up-figure__tick up-figure__tick--tl"></span>
  <span class="up-figure__tick up-figure__tick--tr"></span>
  <span class="up-figure__tick up-figure__tick--bl"></span>
  <span class="up-figure__tick up-figure__tick--br"></span>
  <span class="up-figure__tag"><i></i>INTAKE · ADVE-RTIS</span>
  <figcaption class="up-figure__cap"><span>Brief en cours</span><span class="em">ABIDJAN</span></figcaption>
 </figure>
 <figure class="up-figure">
  <span class="fill"><span>portrait · 16:10</span></span>
  <span class="up-figure__scan"></span>
  <span class="up-figure__tick up-figure__tick--tl"></span>
  <span class="up-figure__tick up-figure__tick--tr"></span>
  <span class="up-figure__tick up-figure__tick--bl"></span>
  <span class="up-figure__tick up-figure__tick--br"></span>
  <span class="up-figure__tag"><i></i>ECOSYSTEM · LIVE</span>
  <figcaption class="up-figure__cap"><span>Crew × marque · apparié</span><span class="em">LAGOS</span></figcaption>
 </figure>
</div></body></html>
