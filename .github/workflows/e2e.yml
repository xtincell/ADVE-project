name: E2E

on:
  workflow_dispatch:

# Déclenchement MANUEL uniquement. La suite e2e n'est pas encore vérifiée verte
# (nécessite build + seed + secrets) : la lancer sur chaque push générait du
# rouge sans signal. Réactiver `push: [main]` / `pull_request` une fois la suite
# stabilisée (P5+ du plan).

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lafusee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lafusee_test
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - name: Seed DB (demo accounts + fixtures)
        run: npm run db:seed
      - name: Build Next.js (required by playwright webServer `next start`)
        run: npm run build
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
