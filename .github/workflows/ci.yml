name: CI v7

on:
  push:
    branches: [main, "claude/**", "rebuild/**"]
  pull_request:

jobs:
  verify:
    name: Typecheck · tests · schema · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run db:validate
      - run: npm run build
