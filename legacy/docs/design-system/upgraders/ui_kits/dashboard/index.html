<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UPgraders — Brand Dashboard</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="kit.css" />
<style>
  html, body { margin: 0; background: var(--surface-sunken); }
  .theme-fab { position: fixed; right: 22px; bottom: 22px; z-index: 70; display: flex; gap: 6px;
    background: var(--surface-card); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 5px; box-shadow: var(--shadow-md); }
  .theme-fab button { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
    background: none; color: var(--text-muted); display: grid; place-items: center; font-size: 17px; }
  .theme-fab button.on { background: var(--accent); color: #fff; }
</style>
</head>
<body>
<div class="up-root" id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Modals.jsx"></script>
<script type="text/babel">
function App() {
  const I = window.UPIcons;
  const [active, setActive] = React.useState("home");
  const [modal, setModal] = React.useState(null);   // "portal" | "levelup" | null
  const [theme, setTheme] = React.useState("dark");

  React.useEffect(() => {
    const root = document.getElementById("app");
    if (theme === "light") root.setAttribute("data-theme", "light");
    else root.removeAttribute("data-theme");
  }, [theme]);

  return (
    <div className="dash">
      <window.Sidebar
        active={active}
        onNav={setActive}
        onPortal={() => setModal("portal")}
        onUser={() => setModal("portal")}
      />
      <main className="main">
        <window.Topbar />
        <window.Dashboard
          onStart={() => setModal("levelup")}
          onPerf={() => setActive("analytics")}
        />
      </main>
      {modal === "portal" && <window.PortalModal onClose={() => setModal(null)} />}
      {modal === "levelup" && <window.LevelUpModal onClose={() => setModal(null)} />}

      <div className="theme-fab">
        <button className={theme === "dark" ? "on" : ""} onClick={() => setTheme("dark")} aria-label="Sombre"><I.Moon /></button>
        <button className={theme === "light" ? "on" : ""} onClick={() => setTheme("light")} aria-label="Clair"><I.Sun /></button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
