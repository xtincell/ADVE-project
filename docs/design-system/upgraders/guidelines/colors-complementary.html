<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}
 .p{background:var(--surface-page);padding:24px;display:flex;gap:14px;flex-wrap:wrap}
 .sw{flex:1;min-width:120px}
 .chip{height:80px;border-radius:var(--radius-lg);display:flex;align-items:flex-end;padding:10px}
 .nm{font-family:var(--font-sans);font-weight:700;font-size:13px;color:var(--text-primary);margin-top:10px}
 .hx{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:2px}
</style></head>
<body><div class="up-root p">
 <div class="sw"><div class="chip" style="background:var(--up-green)"></div><div class="nm">Vert · Growth</div><div class="hx">#10B981</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-blue)"></div><div class="nm">Bleu · Web</div><div class="hx">#3B82F6</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-violet)"></div><div class="nm">Violet · Creator</div><div class="hx">#8B5CF6</div></div>
 <div class="sw"><div class="chip" style="background:var(--up-orange)"></div><div class="nm">Orange · Agency</div><div class="hx">#F59E0B</div></div>
</div></body></html>
