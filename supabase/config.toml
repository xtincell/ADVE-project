# Supabase project configuration — La Fusée Industry OS (ADVE-project).
#
# Generated by `supabase init` and linked to the remote project via
# `supabase link --project-ref myhzthcfmbcelsfbrbcf`.
#
# Authoritative DB layer remains Prisma 7 (driver adapter `@prisma/adapter-pg`,
# cf. src/lib/db.ts + ADR Phase 12.2). Prisma owns the schema + migrations
# (`prisma/migrations/`, applied via `prisma migrate deploy` at the Vercel
# build step). This file exists so the Supabase CLI / dashboard / MCP can
# operate against the linked project; it does NOT replace the Prisma migration
# history. Secrets (DB password, service-role key) NEVER live here — they are
# env vars only (ADR-0075).

# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when running `supabase init`.
project_id = "myhzthcfmbcelsfbrbcf"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this
# schema will get API endpoints. `public` is always included.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote
# database's. Remote project is Postgres 17.
major_version = 17

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
# Configure one of the supported pooler modes: `transaction`, `session`.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323

# Email testing server. Emails sent with the local dev setup are not actually
# sent - rather, they are monitored, and you can view the emails that would
# have been sent from the web interface.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for
# constructing URLs used in emails.
site_url = "http://localhost:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to
# post authentication.
additional_redirect_urls = ["https://localhost:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour).
jwt_expiry = 3600
# Allow/disallow new user signups to your project.
enable_signup = true

[analytics]
enabled = false
