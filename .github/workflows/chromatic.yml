name: Chromatic

on:
  push:
    branches: [main, "feat/ds-panda-v1"]
  pull_request:
    branches: [main]

jobs:
  chromatic:
    name: Visual review (Chromatic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Check for Chromatic token
        id: token_check
        env:
          TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CHROMATIC_PROJECT_TOKEN secret not configured — skipping visual review."
          fi
      - name: Publish to Chromatic
        if: steps.token_check.outputs.configured == 'true'
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitZeroOnChanges: true
